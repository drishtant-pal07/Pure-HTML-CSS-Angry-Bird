<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Birds</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-color: #4974a5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: center;
        }
       .bird{
        height: 400px;
        width: 400px;
        position: absolute;
       }
       .head{
        position: absolute;
        height: 400px;
        width: 400px;
        background-color: #dc002d;
        border-radius: 50%;
        border: 3px solid #000801;
        overflow: hidden;
       }
       .head:before{
        content: "";
        position: absolute;
        height: 300px;
        width: 300px;
        background-color: #eccaa8;
        border-radius: 50%;
        top: 64%;
        left: 15%;
       }
       .tail-middle, .tail-bottom, .tail-top{
        height: 80px;
        width: 80px;
        position: absolute;
        clip-path: polygon(0 27%, 100% 40%, 100% 68%, 0 79%);
        background-color: #000801;
       }
       .tail-middle{
        top: 36%;
        left: -17%;
       }
       .tail-top{
        top: 30%;
        left: -8%;
        transform: rotate(35deg);
       }
       .tail-bottom{
        top: 44%;
        left: -11%;
        transform: rotate(-25deg);
       }
       .eyebrow-right{
        position: absolute;
        height: 50px;
        width: 140px;
        background-color: #000801;
        top: 25%;
        right: 15%;
        transform: rotate(-8deg);
        z-index: 10;
       }
       .eyebrow-left{
        position: absolute;
        height: 50px;
        width: 140px;
        background-color: #000801;
        top: 25%;
        left: 15%;
        transform: rotate(8deg);
        z-index: 10;
       }
       .eye-right{
        position: absolute;
        height: 120px;
        width: 120px;
        background-color: #fff;
        top: 30%;
        right: 20%;
        border-radius: 50%;
        box-shadow: 10px 3px 10px 3px #ab0024;
        border: 2px solid #000;
       }
       .eye-right:before{
        content: "";
        height: 30px;
        width: 30px;
        border-radius: 50%;
        background-color: #000;
        position: absolute;
        top: 25%;
        left: 25%;
       }
       .eye-right:after{
        content: "";
        height: 10px;
        width: 10px;
        border-radius: 50%;
        background-color: #fff;
        position: absolute;
        top: 30%;
        left: 38%;
       }
       .eye-left{
        position: absolute;
        height: 120px;
        width: 120px;
        background-color: #fff;
        top: 30%;
        left: 21%;
        border-radius: 50%;
        box-shadow: -10px 3px 10px 3px #ab0024;
        border: 2px solid #000;
       }
       .eye-left:before{
        content: "";
        height: 30px;
        width: 30px;
        border-radius: 50%;
        background-color: #000;
        position: absolute;
        top: 25%;
        right: 25%;
       }
       .eye-left:after{
        content: "";
        height: 10px;
        width: 10px;
        border-radius: 50%;
        background-color: #fff;
        position: absolute;
        top: 30%;
        right: 30%;
       }
       .beak{
        content: "";
        height: 110px;
        width: 110px;
        background-color: #fca90d;
        position: absolute;
        border: 2px solid #000;
        border-radius: 29% 0% 5% 0%;
        transform: rotate(42deg);
        top: 53%;
        left: 37%;
       }
       .beak:before{
        content: "";
        height: 1px;
        width: 150px;
        background-color: #000;
        position: absolute;
        transform: rotate(-45deg); 
        border: 1px solid #000;   
        bottom: 47%;
        right: -22%;  
        border: 0.5px solid #000; 
       }
       .hair{
        content: "";
        height: 110px;
        width: 55px;
        background-color: #dc002d;
        position: absolute;
        border: 3px solid #000801;
        transform: rotate(-45deg);
        top: -67px;
        left: 44%;
        border-radius: 50%;
       }
       .hair:before{
        content: "";
        height: 110px;
        width: 55px;
        background-color: #dc002d;
        position: absolute;
        border: 3px solid #000801;
        transform: rotate(-27deg);
        top: -30px;
        left: -75%;
        border-radius: 50%;
       }

    </style>
</head>
<body>
    <div class="bird">
        <div class="tail-middle"></div>
        <div class="tail-top"></div>
        <div class="tail-bottom"></div>


        <div class="hair"></div>
        <div class="head"></div>


        <div class="eyebrow-right"></div>
        <div class="eyebrow-left"></div>


        <div class="eye-right"></div>
        <div class="eye-left"></div>


        <div class="beak"></div>
    </div>
</body>
</html>
